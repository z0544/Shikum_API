# Render Blueprint — SHIKUM_API (NestJS + Prisma + PostgreSQL)
# Deploy: Render Dashboard -> New -> Blueprint -> select this repo.
# It provisions a managed PostgreSQL DB, wires DATABASE_URL automatically,
# creates the schema (prisma db push) and seeds data from server/data/*.xlsx (ETL).

databases:
  - name: shikum-db
    databaseName: shikum
    plan: free
    region: frankfurt

services:
  - type: web
    name: shikum-api
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /health
    # build + create schema + seed data on the managed DB (DATABASE_URL available at build time)
    buildCommand: npm install && npm run build && npm --prefix server run db:deploy
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: shikum-db
          property: connectionString
      - key: PORT
        value: "3000"
      - key: CORS_ORIGINS
        value: "*"
      # Admin token for protected endpoints — set your own value in the dashboard.
      - key: ADMIN_TOKEN
        sync: false
