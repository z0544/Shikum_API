# Render Blueprint — SHIKUM_API (NestJS + Prisma + PostgreSQL)
# Deploy: Render Dashboard -> New -> Blueprint -> select this repo.
# It provisions a managed PostgreSQL DB, wires DATABASE_URL automatically,
# creates the schema (prisma db push) and seeds data from server/data/*.xlsx (ETL).

databases:
  - name: shikum-db
    databaseName: shikum
    plan: free
    region: frankfurt

services:
  - type: web
    name: shikum-api
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /health
    buildCommand: npm install && npm run build
    # On start: prestart pushes the Prisma schema, and the app auto-seeds the DB
    # from server/data/*.xlsx on first boot (when empty). Fully automatic.
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: shikum-db
          property: connectionString
      - key: PORT
        value: "3000"
      - key: CORS_ORIGINS
        value: "*"
      # Admin token for protected endpoints — generated automatically.
      - key: ADMIN_TOKEN
        generateValue: true
      # Gemini API key for the AI chat assistant — set your key in the dashboard.
      - key: GEMINI_API_KEY
        sync: false
